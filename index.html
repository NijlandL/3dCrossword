<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Crossword</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://unpkg.com/rivescript@latest/dist/rivescript.min.js"></script>
</head>
<body>
    <h1 class="title">3D Crossword</h1>

    <main id="canvas-wrap"></main>

    <nav id="buttons" aria-label="crossword rows"></nav>

    <div class="hud">
      <button id="connect-arduino" class="row-btn">⚡ Connect Arduino</button>
      <span id="arduino-status">○ disconnected</span>
      <span class="letter-hud">Letter: <span id="current-letter">A</span></span>
    </div>

    <script src="js/arduino.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/sketch.js"></script>
</body>
</html>
